name: Deploy Bot (NL)

on:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'

jobs:
  deploy_bot:
    runs-on: ubuntu-latest
    steps:
      - name: SSH — Pull latest backend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.SSH_BOT_HOST }}
          username: ${{ secrets.SSH_BOT_USER }}
          key:      ${{ secrets.SSH_BOT_KEY }}
          port:     ${{ secrets.SSH_BOT_PORT }}
          script: |
            cd /opt/itx-bot/repo
            git fetch --all
            git reset --hard origin/master

      - name: SSH — Build and restart bot
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.SSH_BOT_HOST }}
          username: ${{ secrets.SSH_BOT_USER }}
          key:      ${{ secrets.SSH_BOT_KEY }}
          port:     ${{ secrets.SSH_BOT_PORT }}
          script: |
            cd /opt/itx-bot
            docker compose build
            docker compose up -d --no-deps itx-bot
            docker image prune -f
