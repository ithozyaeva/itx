name: Deploy Production Environment

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm production deployment'
        required: true
        default: 'no'

jobs:
  deploy_production:
    if: github.event.inputs.confirm == 'yes'
    runs-on: ubuntu-latest
    steps:
      - name: Check Confirmation
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "yes" ]]; then
            echo "Deployment not confirmed. Exiting."
            exit 1
          fi
          echo "Deploying to production environment..."

      - name: SSH — Pull latest
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          port:     ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.PROJECT_PROD_PATH }}
            git fetch --all
            git reset --hard origin/master

      - name: SSH — Build and restart with zero downtime
        uses: appleboy/ssh-action@v1.0.0
        env:
          VITE_YANDEX_METRIKA_ID: ${{ secrets.VITE_YANDEX_METRIKA_ID }}
          VITE_YANDEX_METRIKA_ENABLED: ${{ secrets.VITE_YANDEX_METRIKA_ENABLED }}
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          port:     ${{ secrets.SSH_PORT }}
          envs: VITE_YANDEX_METRIKA_ID,VITE_YANDEX_METRIKA_ENABLED
          script: |
            cd ${{ secrets.PROJECT_PROD_PATH }}
            export CACHEBUST=$(date +%s)
            # Build new images, CACHEBUST invalidates layer cache after COPY
            docker compose -f docker-compose.prod.yml build --build-arg CACHEBUST=$CACHEBUST
            # Restart services one by one (nginx stays up, serves cached static)
            docker compose -f docker-compose.prod.yml up -d --no-deps backend
            docker compose -f docker-compose.prod.yml up -d --no-deps landing-frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps platform-frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps admin-frontend
            # Reload nginx to pick up any config changes (graceful, no downtime)
            docker compose -f docker-compose.prod.yml exec nginx nginx -s reload || true
            # Clean up old images
            docker image prune -f