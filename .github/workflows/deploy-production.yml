name: Deploy Production Environment

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm production deployment'
        required: true
        default: 'no'

jobs:
  deploy_production:
    if: github.event.inputs.confirm == 'yes'
    runs-on: ubuntu-latest
    steps:
      - name: Check Confirmation
        run: |
          if [[ "${{ github.event.inputs.confirm }}" != "yes" ]]; then
            echo "Deployment not confirmed. Exiting."
            exit 1
          fi
          echo "Deploying to production environment..."

      - name: SSH — Pull latest
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          port:     ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.PROJECT_PROD_PATH }}
            git fetch --all
            git reset --hard origin/master

      - name: SSH — Build and restart with zero downtime
        uses: appleboy/ssh-action@v1.0.0
        env:
          VITE_YANDEX_METRIKA_ID: ${{ secrets.VITE_YANDEX_METRIKA_ID }}
          VITE_YANDEX_METRIKA_ENABLED: ${{ secrets.VITE_YANDEX_METRIKA_ENABLED }}
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          port:     ${{ secrets.SSH_PORT }}
          envs: VITE_YANDEX_METRIKA_ID,VITE_YANDEX_METRIKA_ENABLED
          script: |
            cd ${{ secrets.PROJECT_PROD_PATH }}
            # Copy shared UI package into frontend directories for Docker context.
            # Без этого admin-frontend/platform-frontend build падает при загрузке
            # tailwind.config.js (require('../packages/ui/tailwind.preset')), а сам
            # docker compose build завершается с ненулевым кодом, но workflow этого
            # не видит — и up -d поднимает контейнер на старом образе.
            cp -r packages/ui platform-frontend/_packages_ui
            cp -r packages/ui admin-frontend/_packages_ui
            # Build new images with legacy builder (BuildKit ignores --no-cache)
            DOCKER_BUILDKIT=0 CACHEBUST=$(date +%s) docker compose -f docker-compose.prod.yml build --no-cache
            # Remove temporary copies
            rm -rf platform-frontend/_packages_ui admin-frontend/_packages_ui
            # Проект-локальная очистка зависших контейнеров от предыдущих неудачных деплоев.
            # docker compose --force-recreate падает с Container name already in use, если
            # старый контейнер остался c hash-prefix'ом — явно удаляем по имени.
            for svc in backend landing-frontend platform-frontend admin-frontend; do
              docker rm -f "$svc" 2>/dev/null || true
            done
            # Restart services with forced recreation to pick up new images
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate backend
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate landing-frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate platform-frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate admin-frontend
            # Регенерируем nginx default.conf: run --rm запускает одноразовый nginx-init
            # синхронно (ждёт exit), envsubst записывает свежий default.conf на bind-mount.
            # Только после exit пересоздаём nginx, чтобы он прочитал свежий конфиг.
            docker compose -f docker-compose.prod.yml run --rm --no-deps nginx-init
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate nginx
            # Clean up old images
            docker image prune -f