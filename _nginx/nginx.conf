events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  server_tokens off;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  # ВАЖНО: ngx_http_headers_module игнорирует все add_header верхнего уровня,
  # если в location/server определён хотя бы один свой add_header. Поэтому держим
  # ВСЕ security-заголовки тут — и не пишем add_header нигде ниже.
  #
  # HSTS включаем только для https через map; на http-localhost пустая строка →
  # nginx не добавит заголовок.
  # Cache-Control — только для html; для js/css/svg → пустая строка → не добавляем.
  map $scheme $itx_hsts {
    default  "";
    "https"  "max-age=31536000; includeSubDomains";
  }
  map $sent_http_content_type $itx_cache_control {
    default                "";
    "~*text/html"          "no-cache, no-store, must-revalidate";
  }

  add_header Strict-Transport-Security $itx_hsts always;
  add_header Cache-Control $itx_cache_control always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

  include /etc/nginx/conf.d/*.conf;
}