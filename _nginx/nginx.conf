events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  server_tokens off;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  # Cache-Control только для html — раздаём через map, чтобы не плодить
  # `add_header Cache-Control` в location-блоках. nginx-овский ngx_http_headers_module
  # игнорирует все add_header с верхнего уровня, если в location определён хотя
  # бы один свой — поэтому раньше security-заголовки до html-файлов не доезжали.
  map $sent_http_content_type $itx_cache_control {
    default                "";
    "~*text/html"          "no-cache, no-store, must-revalidate";
  }

  add_header Cache-Control $itx_cache_control always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
  # HSTS добавляется только в prod-https-server-блоках (см. conf.d/nginx.conf.template),
  # чтобы http://localhost не залипал в HSTS-кеше браузера.

  include /etc/nginx/conf.d/*.conf;
}